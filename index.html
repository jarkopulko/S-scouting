<title>SK Sigma Olomouc — Scouting Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080d12;--bg2:#0e1820;--card:#121d2a;--inp:#192434;
  --blue:#1a4fa0;--blue2:#2563d4;
  --green:#b8f542;--green-bg:rgba(184,245,66,.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --txt:#edf2f8;--txt2:#7a95b2;--muted:#3d5470;--bdr:#1c2e44;
}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:13px 22px;display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:50}
.logo{width:38px;height:38px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:8px;color:#fff;text-align:center;line-height:1.3;flex-shrink:0}
.hdr-t{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.07em;text-transform:uppercase;flex:1}
.hdr-s{font-size:10px;color:var(--txt2);letter-spacing:.1em;text-transform:uppercase}
.main{max-width:1180px;margin:0 auto;padding:20px 20px 80px}
.stitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:22px 0 9px;display:flex;align-items:center;gap:9px}
.stitle::after{content:'';flex:1;height:1px;background:var(--bdr)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fi{background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:8px 11px;color:var(--txt);font-size:13px;width:100%;outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.fi:focus{border-color:var(--blue2)}
.fi::placeholder{color:var(--muted)}
.fi.nm{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;padding:9px 13px;margin-bottom:10px}
.fi:disabled{background:var(--bg2);color:var(--muted);cursor:default;border-color:var(--bdr)}
.tog{display:flex;background:var(--inp);border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.tbtn{flex:1;padding:8px 6px;border:none;background:transparent;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.tbtn.on{background:var(--blue);color:#fff}
.ptabs{display:flex;gap:6px;flex-wrap:wrap}
.ptab{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--txt2);transition:all .15s}
.ptab:hover{border-color:var(--blue2);color:var(--txt)}
.ptab.on{background:var(--blue);border-color:var(--blue);color:#fff}
.cl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cl-box{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:14px}
.cl-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);padding-bottom:8px;border-bottom:1px solid var(--bdr);margin-bottom:9px}
.cl-div{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:10px 0 5px;display:flex;align-items:center;gap:7px}
.cl-div::after{content:'';flex:1;height:1px;background:var(--bdr)}
.ci-row{margin-bottom:1px}
.ci-main{display:flex;align-items:flex-start;gap:8px;padding:4px 6px;border-radius:5px;transition:background .1s}
.ci-main.st-yes{background:var(--green-bg)}
.ci-main.st-no{background:var(--red-bg)}
.ci-btns{display:flex;gap:3px;flex-shrink:0;margin-top:2px}
.chk{width:18px;height:18px;border:1.5px solid var(--muted);border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;font-weight:900;transition:all .15s;user-select:none;flex-shrink:0;background:transparent}
.chk:hover{border-color:var(--txt2)}
.chk.yes{background:var(--green);border-color:var(--green);color:#000}
.chk.no{background:var(--red);border-color:var(--red);color:#fff}
.ci-lbl{font-size:12px;color:var(--txt2);line-height:1.45;cursor:default;flex:1}
.ci-main.st-yes .ci-lbl,.ci-main.st-no .ci-lbl{color:var(--txt)}
.ci-note{display:none;margin:3px 0 6px 29px}
.ci-note.show{display:block}
.ci-note textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:4px;padding:4px 8px;color:var(--txt2);font-size:11px;font-family:'Barlow',sans-serif;outline:none;resize:none;overflow:hidden;line-height:1.4;transition:border-color .15s;min-height:22px}
.ci-note textarea:focus{border-color:var(--blue2);color:var(--txt)}
.ci-note textarea::placeholder{color:var(--muted);font-style:italic}
.sec-note-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:11px 0 4px;border-top:1px solid var(--bdr);padding-top:10px}
.sec-note textarea{width:100%;background:var(--inp);border:1px solid var(--bdr);border-radius:5px;padding:7px 10px;color:var(--txt2);font-size:12px;font-family:'Barlow',sans-serif;outline:none;resize:none;min-height:40px;overflow:hidden;line-height:1.5;transition:border-color .15s}
.sec-note textarea:focus{border-color:var(--blue2);color:var(--txt)}
.sec-note textarea::placeholder{color:var(--muted);font-style:italic}
.rat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:14px}
.rl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.rec-btns{display:flex;gap:7px}
.rec-btn{flex:1;padding:10px;border:1px solid var(--bdr);border-radius:6px;background:var(--inp);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;cursor:pointer;color:var(--txt2);transition:all .15s}
.rec-btn.ano.on{background:rgba(184,245,66,.15);border-color:var(--green);color:var(--green)}
.rec-btn.ne.on{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.rsel{background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:9px 10px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;width:100%;outline:none;cursor:pointer;transition:border-color .15s;text-align:center}
.rsel:focus{border-color:var(--blue2)}
.rsel option{background:var(--card)}
.match-notes{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:11px 14px;color:var(--txt2);font-family:'Barlow',sans-serif;font-size:13px;outline:none;resize:none;min-height:80px;line-height:1.65;transition:border-color .15s}
.match-notes:focus{border-color:var(--blue2);color:var(--txt)}
.match-notes::placeholder{color:var(--muted);font-style:italic}
.copy-btn{width:100%;padding:15px;background:var(--green);border:none;border-radius:8px;color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-top:18px}
.copy-btn:hover:not(:disabled){background:#cfff70;transform:translateY(-1px)}
.copy-btn:disabled{background:var(--muted);cursor:not-allowed;color:var(--bg2)}
.copy-btn.copied{background:#28a745;color:#fff}
.tip-box{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:13px 16px;margin-top:12px;font-size:13px;color:var(--txt2);line-height:1.6}
.tip-box strong{color:var(--green)}
.empty-pos{text-align:center;padding:30px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>

press:['D→A: Szybkość przełączenia — natychmiastowa gotowość do biegu','A→D: Intensywność pressingu i kierunkowe zamknięcie rywali','Agresywność przy pressingu na obrońców — wywieranie presji','Organizacja pressingu — kierowanie frontem ataku bez piłki'],
motor:['Prędkość i eksplozywność — szybkość sprintów za obroną rywala','Powtarzalność sprintów przez 90 minut (cel 300 m w sprintach)','Siła fizyczna i odporność w kontaktach ze stoperami','Pewność siebie i głód gry — wewnętrzna motywacja do rozstrzygania','Odporność mentalna — reakcja po nieudanych sytuacjach bramkowych'],
},
};

function autoH(el){if(!el)return;el.style.height='auto';el.style.height=el.scrollHeight+'px';}

function ClSection(props){
  var sec=props.sec,clKey=props.clKey,chk=props.chk,cnotes=props.cnotes,snotes=props.snotes;
  var setChkVal=props.setChkVal,setCn=props.setCn,usn=props.usn;
  var cl=clKey?CL[clKey]:{},items=cl[sec]||[],checkIdx=0;
  function getChk(s,i){return chk[s+'_'+i]||null;}
  function getCn(s,i){return cnotes[s+'_'+i]||'';}
  var rows=items.map(function(item,fi){
    if(typeof item==='object'&&item.div)return h('div',{key:'d'+fi,className:'cl-div'},item.div);
    var ci=checkIdx++;var state=getChk(sec,ci);
    return h('div',{key:fi,className:'ci-row'},
      h('div',{className:'ci-main'+(state==='yes'?' st-yes':state==='no'?' st-no':'')},
        h('div',{className:'ci-btns'},
          h('div',{className:'chk'+(state==='yes'?' yes':''),onClick:function(){setChkVal(sec,ci,'yes');},title:'Dobry element'},state==='yes'?'✓':''),
          h('div',{className:'chk'+(state==='no'?' no':''),onClick:function(){setChkVal(sec,ci,'no');},title:'Słaby element'},state==='no'?'✕':'')
        ),
        h('span',{className:'ci-lbl'},item)
      ),
      h('div',{className:'ci-note'+(state!==null?' show':'')},
        h('textarea',{placeholder:'Komentarz — np. spełnia w 70%, bo...',value:getCn(sec,ci),rows:1,
          onChange:function(e){setCn(sec,ci,e.target.value);autoH(e.target);},
          onFocus:function(e){autoH(e.target);}})
      )
    );
  });
  return h('div',{className:'cl-box'},
    h('div',{className:'cl-title'},SEC_PL[sec]),rows,
    h('div',{className:'sec-note-label'},'Uwagi do sekcji'),
    h('div',{className:'sec-note'},
      h('textarea',{
        placeholder:'Ogólne uwagi — co wyróżniało zawodnika w tej sekcji...',
        value:snotes[sec]||'',rows:2,
        onChange:function(e){usn(sec,e.target.value);autoH(e.target);},
        onFocus:function(e){autoH(e.target);}
      })
    )
  );
}

function App(){
  var ns=_us(''),name=ns[0],setName=ns[1];
  var ts=_us(''),tmLink=ts[0],setTmLink=ts[1];
  var ms=_us('Video'),mode=ms[0],setMode=ms[1];
  var ds=_us(today),date=ds[0],setDate=ds[1];
  var ps=_us(null),pos=ps[0],setPos=ps[1];
  var cs=_us({}),chk=cs[0],setChk=cs[1];
  var cns=_us({}),cnotes=cns[0],setCnotes=cns[1];
  var sns=_us({tech:'',def:'',press:'',motor:''}),snotes=sns[0],setSnotes=sns[1];
  var mns=_us(''),matchNotes=mns[0],setMatchNotes=mns[1];
  var rs=_us({rec:'',rating:'',pot:''}),ratings=rs[0],setRatings=rs[1];
  var cp=_us(false),wasCopied=cp[0],setCopied=cp[1];

  var clKey=pos?POS_TO_CL[pos]:null;
  function getChk(sec,idx){return chk[sec+'_'+idx]||null;}
  function setChkVal(sec,idx,val){setChk(function(p){var n=Object.assign({},p),k=sec+'_'+idx;n[k]=(n[k]===val)?null:val;return n;});}
  function getCn(sec,idx){return cnotes[sec+'_'+idx]||'';}
  function setCn(sec,idx,v){setCnotes(function(p){var n=Object.assign({},p);n[sec+'_'+idx]=v;return n;});}
  function usn(k,v){setSnotes(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  function ur(k,v){setRatings(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  function buildText(){
    var posLabel=pos?POSITIONS.find(function(x){return x.id===pos;}).label:'BRAK POZYCJI';
    var cl=clKey?CL[clKey]:{},lines=[];
    lines.push('=== SCOUTING REPORT — DANE DO RAPORTU ===','');
    lines.push('ZAWODNIK: '+(name||'(brak)'));
    lines.push('TRANSFERMARKT: '+(tmLink||'(brak)'));
    lines.push('POZYCJA: '+posLabel);
    lines.push('OBSERWACJA: '+mode);
    lines.push('SKAUT: Jarosław Pulkowski');
    lines.push('DATA: '+date,'');
    lines.push('OCENY — Doporučení: '+(ratings.rec||'-')+'  |  Hodnocení: '+(ratings.rating||'-')+'  |  Potenciál: '+(ratings.pot||'-'),'');
    SECS.forEach(function(sec){
      var items=cl[sec]||[],checkIdx=0;
      lines.push('--- '+SEC_PL[sec].toUpperCase()+' ---');
      items.forEach(function(item){
        if(typeof item==='object'&&item.div){lines.push('  ['+item.div+']');}
        else{var state=getChk(sec,checkIdx),note=getCn(sec,checkIdx),mark=state==='yes'?'[+]':state==='no'?'[-]':'[ ]',line=mark+' '+item;if(note)line+='  // '+note;lines.push(line);checkIdx++;}
      });
      if(snotes[sec])lines.push('  >> Uwagi do sekcji: '+snotes[sec]);
      lines.push('');
    });
    if(matchNotes){lines.push('--- OGÓLNE NOTATKI Z MECZU ---',matchNotes,'');}
    lines.push('==========================================');
    return lines.join('\n');
  }

  function doCopy(){
    navigator.clipboard.writeText(buildText()).then(function(){setCopied(true);setTimeout(function(){setCopied(false);},3000);});
  }

  return h('div',null,
    h('div',{className:'hdr'},h('div',{className:'logo'},'SK',h('br'),'SIGMA'),h('div',null,h('div',{className:'hdr-t'},'Scouting Tool'),h('div',{className:'hdr-s'},'SK Sigma Olomouc'))),
    h('div',{className:'main'},
      h('div',{className:'stitle'},'Zawodnik'),
      h('input',{className:'fi nm',placeholder:'Imię i nazwisko zawodnika...',value:name,onChange:function(e){setName(e.target.value);}}),
      h('div',{className:'g2'},
        h('div',null,h('div',{className:'fl'},'Profil na Transfermarkt (link)'),h('input',{className:'fi',placeholder:'https://www.transfermarkt.com/...',value:tmLink,onChange:function(e){setTmLink(e.target.value);}})),
        h('div',{className:'g3'},
          h('div',null,h('div',{className:'fl'},'Skaut'),h('input',{className:'fi',value:'Jarosław Pulkowski',disabled:true})),
          h('div',null,h('div',{className:'fl'},'Data obserwacji'),h('input',{className:'fi',type:'date',value:date,onChange:function(e){setDate(e.target.value);}})),
          h('div',null,h('div',{className:'fl'},'Typ obserwacji'),h('div',{className:'tog'},['Video','Na żywo'].map(function(o){return h('button',{key:o,className:'tbtn'+(mode===o?' on':''),onClick:function(){setMode(o);}},o);})))
        )
      ),
      h('div',{className:'stitle'},'Pozycja obserwowanego zawodnika'),
      h('div',{className:'ptabs'},POSITIONS.map(function(p){return h('button',{key:p.id,className:'ptab'+(pos===p.id?' on':''),onClick:function(){setPos(p.id);}},p.label);})),
      h('div',{className:'stitle'},'Checklista obserwacyjna'),
      !clKey?h('div',{className:'empty-pos'},'Wybierz pozycję, aby zobaczyć checklistę'):h('div',{className:'cl-grid'},SECS.map(function(sec){return h(ClSection,{key:sec,sec:sec,clKey:clKey,chk:chk,cnotes:cnotes,snotes:snotes,setChkVal:setChkVal,setCn:setCn,usn:usn});})),
      h('div',{className:'stitle'},'Ocena zawodnika'),
      h('div',{className:'rat-row'},
        h('div',null,h('div',{className:'rl'},'Doporučení'),h('div',{className:'rec-btns'},h('button',{className:'rec-btn ano'+(ratings.rec==='ANO'?' on':''),onClick:function(){ur('rec','ANO');}}, 'ANO'),h('button',{className:'rec-btn ne'+(ratings.rec==='NE'?' on':''),onClick:function(){ur('rec','NE');}}, 'NE'))),
        h('div',null,h('div',{className:'rl'},'Hodnocení (A = najlepiej)'),h('select',{className:'rsel',value:ratings.rating,onChange:function(e){ur('rating',e.target.value);}},h('option',{value:''},'—'),['A','B','C','D'].map(function(v){return h('option',{key:v,value:v},v);}))),
        h('div',null,h('div',{className:'rl'},'Potenciál (A = najlepiej)'),h('select',{className:'rsel',value:ratings.pot,onChange:function(e){ur('pot',e.target.value);}},h('option',{value:''},'—'),['A','B','C','D'].map(function(v){return h('option',{key:v,value:v},v);})))
      ),
      h('div',{className:'stitle'},'Ogólne notatki z meczu'),
      h('textarea',{className:'match-notes',placeholder:'Kontekst meczu, wynik, styl gry drużyny, warunki obserwacji, cokolwiek istotnego...',value:matchNotes,rows:4,onChange:function(e){setMatchNotes(e.target.value);autoH(e.target);},onFocus:function(e){autoH(e.target);}}),
      h('button',{className:'copy-btn'+(wasCopied?' copied':''),onClick:doCopy,disabled:!pos||!name},wasCopied?'✓  Skopiowano — wklej do Claude (Ctrl+V)':'Kopiuj dane i wklej do Claude'),
      h('div',{className:'tip-box'},h('strong',null,'Jak to działa: '),'Wypełnij checklistę i notatki podczas oglądania meczu. Kliknij przycisk — dane trafią do schowka. Wklej je w oknie Claude, który przygotuje gotowy tekst do raportu Sigmy.')
    )
  );
}
ReactDOM.render(h(App),document.getElementById('app'));
</script>
</body>
</html>
