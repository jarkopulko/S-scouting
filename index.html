<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scouting Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23080d12'/%3E%3Ccircle cx='13' cy='13' r='7' fill='none' stroke='%23b8f542' stroke-width='2.5'/%3E%3Cline x1='18.5' y1='18.5' x2='26' y2='26' stroke='%23b8f542' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080d12;--bg2:#0e1820;--card:#121d2a;--inp:#192434;
  --blue:#1a4fa0;--blue2:#2563d4;
  --green:#b8f542;--green-bg:rgba(184,245,66,.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --txt:#edf2f8;--txt2:#7a95b2;--muted:#3d5470;--bdr:#1c2e44;
}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;flex-wrap:nowrap}
.hdr-center{position:absolute;left:50%;transform:translateX(-50%);pointer-events:none}
.logo{width:34px;height:34px;min-width:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-info{min-width:0}
.hdr-t{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
.hdr-s{font-size:9px;color:var(--txt2);letter-spacing:.09em;text-transform:uppercase}
.hdr-spacer{flex:1}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.hdr-player{background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:0 13px;display:flex;align-items:center;min-width:0;max-width:200px;min-height:34px}
.hdr-player-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:480px){.hdr-player{max-width:110px}.hdr-player-name{font-size:12px}}
.save-dot{width:6px;height:6px;min-width:6px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .3s}
.save-dot.show{opacity:1}

/* RIGHT NAV */
.rnav{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:8px 6px}
.rnav-btn{width:34px;height:34px;background:transparent;border:none;color:var(--txt2);font-size:18px;cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.rnav-btn:hover:not(:disabled){background:var(--inp);color:var(--txt)}
.rnav-btn:disabled{opacity:.2;cursor:default}
.rnav-counter{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--txt);text-align:center;line-height:1.2;padding:2px 0}
.rnav-dots{display:flex;flex-direction:column;gap:6px;padding:2px 0;align-items:center}
@media(max-width:480px){
  .rnav{right:6px;padding:6px 5px}
  .rnav-btn{width:30px;height:30px;font-size:16px}
}

/* HEADER BUTTONS */
.hdr-btn{padding:7px 11px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;min-height:34px;-webkit-tap-highlight-color:transparent}
.hdr-btn.add{border-color:var(--blue);color:var(--blue2)}
.hdr-btn.add:hover{background:var(--blue);color:#fff}
.hdr-btn.clear:hover{border-color:var(--red);color:var(--red)}

/* PLAYER SECTION */
.player-section{margin-bottom:0}
.player-divider{display:flex;align-items:center;gap:12px;padding:22px 0 6px}
.player-divider-line{flex:1;height:1px;background:var(--bdr)}
.player-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue2);white-space:nowrap}
.remove-btn{padding:4px 10px;background:transparent;border:1px solid var(--bdr);border-radius:5px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.remove-btn:hover{border-color:var(--red);color:var(--red)}

/* PROGRESS BAR */
.prog-row{display:flex;align-items:center;gap:8px;padding:0 0 12px}
.prog-bar{flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease,background .4s ease}
.prog-pct{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;min-width:32px;text-align:right;transition:color .4s ease}
/* rnav dot progress ring */
.rnav-dot-wrap{position:relative;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
.rnav-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr);border:none;cursor:pointer;transition:all .15s;padding:0;-webkit-tap-highlight-color:transparent;position:relative;z-index:1}
.rnav-dot.on{background:var(--green);transform:scale(1.2)}
.rnav-dot:hover:not(.on){background:var(--txt2)}
.rnav-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;transition:border-color .4s ease}

/* MAIN */
.main{max-width:1180px;margin:0 auto;padding:4px 14px 80px}
.stitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:9px}
.stitle::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* INPUTS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fi{background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:9px 11px;color:var(--txt);font-size:16px;width:100%;outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s;-webkit-appearance:none}
.fi:focus{border-color:var(--blue2)}
.fi::placeholder{color:var(--muted)}
.fi.nm{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;padding:9px 13px;margin-bottom:10px}
.fi:disabled{background:var(--bg2);color:var(--muted);cursor:default;border-color:var(--bdr)}
.tog{display:flex;background:var(--inp);border:1px solid var(--bdr);border-radius:6px;overflow:hidden}
.tbtn{flex:1;padding:9px 6px;border:none;background:transparent;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;min-height:40px}
.tbtn.on{background:var(--blue);color:#fff}

/* POSITION TABS */
.ptabs{display:flex;gap:6px;flex-wrap:wrap}
.ptab{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:9px 13px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--txt2);transition:all .15s;min-height:40px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.ptab:hover{border-color:var(--blue2);color:var(--txt)}
.ptab.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* CHECKLIST */
.cl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cl-box{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:14px}
.cl-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);padding-bottom:8px;border-bottom:1px solid var(--bdr);margin-bottom:9px}
.cl-div{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:10px 0 5px;display:flex;align-items:center;gap:7px}
.cl-div::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* 3-LEVEL SCALE */
.ci-row{margin-bottom:3px}
.ci-main{display:flex;align-items:flex-start;gap:8px;padding:5px 6px;border-radius:5px}
.ci-main.st-good,.ci-main.st-ok,.ci-main.st-bad{background:transparent}
.ci-btns{display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.scl{width:26px;height:26px;padding:0;border-radius:50%;border:2px solid transparent;background:transparent;font-size:16px;cursor:pointer;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;opacity:.25;filter:saturate(.4)}
.scl:hover{opacity:.55;filter:saturate(.8);transform:scale(1.12)}
.scl.good{opacity:1;filter:saturate(1);transform:scale(1.1)}
.scl.ok{opacity:1;filter:saturate(1);transform:scale(1.1)}
.scl.bad{opacity:1;filter:saturate(1);transform:scale(1.1)}
.ci-lbl{font-size:12px;color:var(--txt2);line-height:1.5;cursor:default;flex:1}
.ci-main.st-good .ci-lbl,.ci-main.st-ok .ci-lbl,.ci-main.st-bad .ci-lbl{color:var(--txt)}

.ci-note{display:none;margin:3px 0 6px 30px}
.ci-note.show{display:block}
.ci-note textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:4px;padding:5px 8px;color:var(--txt2);font-size:16px;font-family:'Barlow',sans-serif;outline:none;resize:none;overflow:hidden;line-height:1.45;transition:border-color .15s;min-height:26px}
.ci-note textarea:focus{border-color:var(--blue2);color:var(--txt)}
.ci-note textarea::placeholder{color:var(--muted);font-style:italic}

.sec-note-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:11px 0 4px;border-top:1px solid var(--bdr);padding-top:10px}
.sec-note textarea{width:100%;background:var(--inp);border:1px solid var(--bdr);border-radius:5px;padding:8px 10px;color:var(--txt2);font-size:16px;font-family:'Barlow',sans-serif;outline:none;resize:none;min-height:44px;overflow:hidden;line-height:1.5;transition:border-color .15s}
.sec-note textarea:focus{border-color:var(--blue2);color:var(--txt)}
.sec-note textarea::placeholder{color:var(--muted);font-style:italic}

/* RATINGS */
.rat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:14px}
.rl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.rec-btns{display:flex;gap:7px}
.rec-btn{flex:1;padding:11px;border:1px solid var(--bdr);border-radius:6px;background:var(--inp);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;cursor:pointer;color:var(--txt2);transition:all .15s;min-height:44px;-webkit-tap-highlight-color:transparent}
.rec-btn.ano.on{background:rgba(184,245,66,.15);border-color:var(--green);color:var(--green)}
.rec-btn.ne.on{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.rsel{background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:10px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;width:100%;outline:none;cursor:pointer;transition:border-color .15s;text-align:center;min-height:44px;-webkit-appearance:none}
.rsel:focus{border-color:var(--blue2)}
.rsel option{background:var(--card)}

/* MIC BUTTON */
.mic-wrap{position:relative;display:flex;align-items:flex-start}
.mic-wrap textarea{flex:1}
.mic-btn{width:30px;min-width:30px;height:30px;margin-left:6px;margin-top:2px;background:transparent;border:1.5px solid var(--bdr);border-radius:6px;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.mic-btn:hover{border-color:var(--txt2);color:var(--txt)}
.mic-btn.active{border-color:var(--red);color:var(--red);background:var(--red-bg);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.mic-btn.done{border-color:var(--green);color:var(--green)}
@media print{.mic-btn{display:none!important}}
.match-notes{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:11px 14px;color:var(--txt2);font-family:'Barlow',sans-serif;font-size:16px;outline:none;resize:none;min-height:90px;line-height:1.65;transition:border-color .15s}
.match-notes:focus{border-color:var(--blue2);color:var(--txt)}
.match-notes::placeholder{color:var(--muted);font-style:italic}

/* BUTTONS */
.copy-btn{width:100%;padding:16px;background:var(--green);border:none;border-radius:8px;color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-top:18px;min-height:52px;-webkit-tap-highlight-color:transparent}
.copy-btn:active{transform:scale(.98)}
.copy-btn:disabled{background:var(--muted);cursor:not-allowed;color:var(--bg2)}
.copy-btn.copied{background:#28a745;color:#fff}
.pdf-btn{width:100%;padding:13px;background:transparent;border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-top:8px;min-height:46px;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:8px}
.pdf-btn:hover{border-color:var(--blue2);color:var(--txt)}
.pdf-btn:active{transform:scale(.98)}

/* TIP */
.tip-box{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:13px 16px;margin-top:12px;font-size:13px;color:var(--txt2);line-height:1.6}
.tip-box strong{color:var(--green)}
.empty-pos{text-align:center;padding:30px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:28px 24px;max-width:340px;width:100%;text-align:center}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;color:var(--txt)}
.modal-txt{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:22px}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;padding:12px;background:var(--inp);border:1px solid var(--bdr);border-radius:7px;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.modal-confirm{flex:1;padding:12px;background:var(--red);border:none;border-radius:7px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}

/* PRINT */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;color:#111!important;font-size:11pt}
  .hdr,.tip-box,.copy-btn,.pdf-btn,.modal-bg,.save-dot,.hdr-btn,.nav-wrap,.remove-btn{display:none!important}
  .main{padding:0!important;max-width:100%!important}
  .player-divider{padding:16pt 0 8pt}
  .player-divider-line{background:#ccc!important}
  .player-label{color:#1a4fa0!important}
  .stitle{color:#555!important;border-bottom:1pt solid #ccc;padding-bottom:4pt;margin:12pt 0 6pt}
  .stitle::after{display:none}
  .fi,.fi.nm{background:#f8f8f8!important;border:1pt solid #ddd!important;color:#111!important}
  .fi:disabled{background:#f0f0f0!important;color:#555!important}
  .tog{border:1pt solid #ddd!important;background:#fff!important}
  .tbtn{color:#555!important}
  .tbtn.on{background:#1a4fa0!important;color:#fff!important}
  .ptab{border:1pt solid #ddd!important;color:#555!important;font-size:9pt!important;padding:4pt 8pt!important;background:#f8f8f8!important;min-height:auto!important}
  .ptab.on{background:#1a4fa0!important;color:#fff!important;border-color:#1a4fa0!important}
  .cl-grid{grid-template-columns:1fr 1fr;gap:7pt;page-break-inside:avoid}
  .cl-box{border:1pt solid #ddd!important;background:#fafafa!important;padding:9pt!important;page-break-inside:avoid}
  .cl-title{color:#1a4fa0!important;border-bottom:1pt solid #ddd!important}
  .cl-div{color:#888!important}
  .cl-div::after{background:#ddd!important}
  .ci-lbl{color:#222!important;font-size:9pt!important}
  .scl{font-size:12px!important;opacity:.18!important;filter:saturate(.2)!important}
  .scl.good,.scl.ok,.scl.bad{opacity:1!important;filter:saturate(1)!important}
  .ci-note.show{display:block!important}
  .ci-note textarea{background:#f5f5f5!important;border:1pt solid #ddd!important;color:#333!important;font-size:9pt!important;height:auto!important;min-height:0!important;overflow:visible!important}
  .sec-note textarea{background:#f5f5f5!important;border:1pt solid #ddd!important;color:#333!important;font-size:9pt!important;height:auto!important;min-height:0!important;overflow:visible!important}
  .match-notes{background:#fafafa!important;border:1pt solid #ddd!important;color:#333!important;height:auto!important;min-height:0!important;overflow:visible!important}
  textarea{height:auto!important;min-height:0!important;overflow:visible!important;resize:none!important}
  .rat-row{background:#fafafa!important;border:1pt solid #ddd!important;page-break-inside:avoid;grid-template-columns:1fr 1fr 1fr!important}
  .rl{color:#555!important}
  .rec-btn{border:1pt solid #ddd!important;background:#f5f5f5!important;color:#aaa!important;min-height:auto!important}
  .rec-btn.ano.on{background:#d4edda!important;border-color:#28a745!important;color:#1a6b2a!important}
  .rec-btn.ne.on{background:#fde8e8!important;border-color:#dc3545!important;color:#8b0000!important}
  .rsel{background:#f5f5f5!important;border:1pt solid #ddd!important;color:#111!important;min-height:auto!important}
}

/* MOBILE */
@media(max-width:680px){
  .hdr-s{display:none}
  .hdr-btn.add span.btn-full{display:none}
  .hdr-btn.add span.btn-short{display:inline}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .cl-grid{grid-template-columns:1fr}
  .rat-row{grid-template-columns:1fr}
  .ptab{font-size:11px;padding:8px 10px}
  .fi.nm{font-size:18px}
  .main{padding:4px 12px 80px}
}
@media(min-width:681px){
  .hdr-btn.add span.btn-short{display:none}
  .hdr-btn.add span.btn-full{display:inline}
}
@media(max-width:400px){
  .g3{grid-template-columns:1fr}
  .ptab{font-size:10px;padding:7px 8px}
}
</style>
</head>

];

/* ── Speech Recognition ──────────────────────────────────────────── */
var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition || null;
var _activeMicId = null;
var _activeRec = null;

function startMic(fieldId, onResult, onEnd){
  if(!SpeechRec){alert('Twoja przeglądarka nie obsługuje rozpoznawania mowy. Użyj Chrome lub Edge.');return;}
  if(_activeRec){_activeRec.stop();_activeRec=null;}
  var rec = new SpeechRec();
  rec.lang = 'pl-PL';
  rec.continuous = true;
  rec.interimResults = false;
  _activeMicId = fieldId;
  _activeRec = rec;
  rec.onresult = function(e){
    var transcript = '';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) transcript += e.results[i][0].transcript + ' ';
    }
    if(transcript.trim()) onResult(transcript.trim());
  };
  rec.onend = function(){_activeMicId=null;_activeRec=null;onEnd();};
  rec.onerror = function(){_activeMicId=null;_activeRec=null;onEnd();};
  rec.start();
}

function stopMic(){if(_activeRec){_activeRec.stop();_activeRec=null;_activeMicId=null;}}

function MicBtn(props){
  var fieldId=props.fieldId,onResult=props.onResult;
  var as=_us(false),active=as[0],setActive=as[1];
  var ds=_us(false),done=ds[0],setDone=ds[1];
  function toggle(){
    if(active){stopMic();setActive(false);}
    else{
      setDone(false);
      startMic(fieldId,
        function(t){onResult(t);},
        function(){setActive(false);setDone(true);setTimeout(function(){setDone(false);},1500);}
      );
      setActive(true);
    }
  }
  if(!SpeechRec)return null;
  return h('button',{
    className:'mic-btn'+(active?' active':done?' done':''),
    onClick:toggle,
    title:active?'Zatrzymaj nagrywanie':'Nagraj głos',
    type:'button'
  }, active?'⏹':'🎙');
}

function withMic(textarea, fieldId, onAppend){
  return h('div',{className:'mic-wrap'},
    textarea,
    h(MicBtn,{fieldId:fieldId, onResult:function(t){onAppend(t);}})
  );
}

function autoH(el){if(!el)return;el.style.height='auto';el.style.height=el.scrollHeight+'px';}

/* ClSection — outside App to prevent remount */
function ClSection(props){
  var sec=props.sec,clKey=props.clKey,chk=props.chk,cnotes=props.cnotes,snotes=props.snotes;
  var setChkVal=props.setChkVal,setCn=props.setCn,usn=props.usn;
  var cl=clKey?CL[clKey]:{},items=cl[sec]||[],checkIdx=0;
  function getChk(s,i){return chk[s+'_'+i]||null;}
  function getCn(s,i){return cnotes[s+'_'+i]||'';}
  var rows=items.map(function(item,fi){
    if(typeof item==='object'&&item.div)return h('div',{key:'d'+fi,className:'cl-div'},item.div);
    var ci=checkIdx++;var state=getChk(sec,ci);
    var rowCls='ci-main'+(state==='good'?' st-good':state==='ok'?' st-ok':state==='bad'?' st-bad':'');
    return h('div',{key:fi,className:'ci-row'},
      h('div',{className:rowCls},
        h('div',{className:'ci-btns'},
          h('button',{className:'scl'+(state==='good'?' good':''),onClick:function(){setChkVal(sec,ci,'good');},title:'Mocny — wyróżnia się'},'🟢'),
          h('button',{className:'scl'+(state==='ok'?' ok':''),   onClick:function(){setChkVal(sec,ci,'ok');},   title:'OK — jest, ale poniżej oczekiwań'},'🟡'),
          h('button',{className:'scl'+(state==='bad'?' bad':''), onClick:function(){setChkVal(sec,ci,'bad');},  title:'Słaby — wyraźna słabość'},'🔴')
        ),
        h('span',{className:'ci-lbl'},item)
      ),
      h('div',{className:'ci-note'+(state!==null?' show':'')},
        withMic(
          h('textarea',{placeholder:'Komentarz — dodaj szczegół...',value:getCn(sec,ci),rows:1,
            onChange:function(e){setCn(sec,ci,e.target.value);autoH(e.target);},
            onFocus:function(e){autoH(e.target);}}),
          'ci-'+sec+'-'+ci,
          function(t){setCn(sec,ci,(getCn(sec,ci)?getCn(sec,ci)+' ':'')+t);}
        )
      )
    );
  });
  return h('div',{className:'cl-box'},
    h('div',{className:'cl-title'},SEC_PL[sec]),rows,
    h('div',{className:'sec-note-label'},'Uwagi do sekcji'),
    h('div',{className:'sec-note'},
      withMic(
        h('textarea',{placeholder:'Ogólne uwagi — co wyróżniało zawodnika w tej sekcji...',value:snotes[sec]||'',rows:2,
          onChange:function(e){usn(sec,e.target.value);autoH(e.target);},
          onFocus:function(e){autoH(e.target);}}),
        'sn-'+sec,
        function(t){usn(sec,(snotes[sec]?snotes[sec]+' ':'')+t);}
      )
    )
  );
}

function buildText(pl,idx,total){
  var clKey=pl.pos?POS_TO_CL[pl.pos]:null;
  var cl=clKey?CL[clKey]:{};
  var posLabel=pl.pos?POSITIONS.find(function(x){return x.id===pl.pos;}).label:'BRAK POZYCJI';
  var lines=[];
  if(total>1)lines.push('=== ZAWODNIK '+( idx+1)+' / '+total+' ===','');
  lines.push('=== SCOUTING REPORT — DANE DO RAPORTU ===','');
  lines.push('ZAWODNIK: '+(pl.name||'(brak)'));
  lines.push('TRANSFERMARKT: '+(pl.tmLink||'(brak)'));
  lines.push('POZYCJA: '+posLabel);
  lines.push('OBSERWACJA: '+pl.mode);
  lines.push('SKAUT: Jarosław Pulkowski');
  lines.push('DATA: '+pl.date,'');
  lines.push('OCENY — Doporučení: '+(pl.ratings.rec||'-')+'  |  Hodnocení: '+(pl.ratings.rating||'-')+'  |  Potenciál: '+(pl.ratings.pot||'-'),'');
  SECS.forEach(function(sec){
    var items=cl[sec]||[],checkIdx=0;
    lines.push('--- '+SEC_PL[sec].toUpperCase().replace('TAKTIKA','TAKTYKA')+' ---');
    items.forEach(function(item){
      if(typeof item==='object'&&item.div){lines.push('  ['+item.div+']');}
      else{
        var state=pl.chk[sec+'_'+checkIdx]||null;
        var note=pl.cnotes[sec+'_'+checkIdx]||'';
        var mark=state==='good'?'[MOCNY]':state==='ok'?'[OK]':state==='bad'?'[SŁABY]':'[ ]';
        var line=mark+' '+item;
        if(note)line+='  // '+note;
        lines.push(line);checkIdx++;
      }
    });
    if(pl.snotes[sec])lines.push('  >> Uwagi do sekcji: '+pl.snotes[sec]);
    lines.push('');
  });
  if(pl.matchNotes){lines.push('--- OGÓLNE NOTATKI Z MECZU ---',pl.matchNotes,'');}
  lines.push('==========================================');
  return lines.join('\n');
}

function calcProgress(pl){
  var clKey=pl.pos?POS_TO_CL[pl.pos]:null;
  var cl=clKey?CL[clKey]:{};
  var total=0,done=0;
  // checkboxes — each item (non-divider) counts
  SECS.forEach(function(sec){
    var items=cl[sec]||[];
    items.forEach(function(item){
      if(typeof item==='object'&&item.div)return;
      total++;
      var state=pl.chk[sec+'_'+(total-1-(SECS.reduce(function(a,s2){return s2===sec?a:a+(cl[s2]||[]).filter(function(x){return typeof x!=='object';}).length;},0)))];
      // recount per-sec index properly
    });
  });
  // recount correctly
  total=0;done=0;
  SECS.forEach(function(sec){
    var items=cl[sec]||[],ci=0;
    items.forEach(function(item){
      if(typeof item==='object'&&item.div)return;
      total++;
      if(pl.chk[sec+'_'+ci])done++;
      ci++;
    });
    // section note
    total++;
    if(pl.snotes[sec]&&pl.snotes[sec].trim())done++;
  });
  // match notes
  total++;
  if(pl.matchNotes&&pl.matchNotes.trim())done++;
  // ratings: rec, rating, pot
  total+=3;
  if(pl.ratings.rec)done++;
  if(pl.ratings.rating)done++;
  if(pl.ratings.pot)done++;
  if(total===0)return 0;
  return Math.round(done/total*100);
}

function progColor(pct){
  if(pct<30)return '#ef4444';
  if(pct<60)return '#eab308';
  if(pct<85)return '#3b82f6';
  return '#b8f542';
}

function App(){
  var saved=loadState();
  var initPlayers=saved&&saved.players&&saved.players.length?saved.players:[mkPlayer()];
  var ps=_us(initPlayers),players=ps[0],setPlayers=ps[1];
  var ai=_us(0),activeIdx=ai[0],setActiveIdx=ai[1];
  var sd=_us(false),showSaved=sd[0],setShowSaved=sd[1];
  var sc=_us(false),showConfirm=sc[0],setShowConfirm=sc[1];
  var cp=_us({}),copied=cp[0],setCopied=cp[1];

  /* persist */
  _ue(function(){
    saveState({players:players});
    setShowSaved(true);
    var t=setTimeout(function(){setShowSaved(false);},1200);
    return function(){clearTimeout(t);};
  },[players]);

  /* track active player on scroll */
  _ue(function(){
    if(players.length<=1)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          var id=entry.target.getAttribute('data-pid');
          var idx=players.findIndex(function(pl){return String(pl.id)===id;});
          if(idx>=0)setActiveIdx(idx);
        }
      });
    },{rootMargin:'-30% 0px -60% 0px',threshold:0});
    var els=document.querySelectorAll('[data-pid]');
    els.forEach(function(el){obs.observe(el);});
    return function(){obs.disconnect();};
  },[players.length]);

  function scrollToPlayer(idx,id){
    var attempts=0;
    function tryScroll(){
      var el=document.getElementById('ps-'+id);
      if(!el){if(attempts++<10)setTimeout(tryScroll,50);return;}
      var hdrH=(document.querySelector('.hdr')||{offsetHeight:60}).offsetHeight;
      var top=el.getBoundingClientRect().top+window.scrollY-hdrH-12;
      window.scrollTo({top:top,behavior:'smooth'});
    }
    setTimeout(tryScroll,50);
  }

  function addPlayer(){
    var np=mkPlayer();
    var newPlayers=players.concat([np]);
    var newIdx=newPlayers.length-1;
    setPlayers(newPlayers);
    setActiveIdx(newIdx);
    scrollToPlayer(newIdx,np.id);
  }

  function goTo(idx){
    setActiveIdx(idx);
    scrollToPlayer(idx,players[idx].id);
  }

  function upd(idx,field,val){
    setPlayers(function(prev){return prev.map(function(pl,i){if(i!==idx)return pl;var n=Object.assign({},pl);n[field]=val;return n;});});
  }
  function updChk(idx,sec,ci,val){
    setPlayers(function(prev){return prev.map(function(pl,i){
      if(i!==idx)return pl;
      var n=Object.assign({},pl);
      var k=sec+'_'+ci;
      n.chk=Object.assign({},pl.chk);
      n.chk[k]=(n.chk[k]===val)?null:val;
      return n;
    });});
  }
  function updCn(idx,sec,ci,val){
    setPlayers(function(prev){return prev.map(function(pl,i){
      if(i!==idx)return pl;
      var n=Object.assign({},pl);
      n.cnotes=Object.assign({},pl.cnotes);
      n.cnotes[sec+'_'+ci]=val;
      return n;
    });});
  }
  function updSn(idx,sec,val){
    setPlayers(function(prev){return prev.map(function(pl,i){
      if(i!==idx)return pl;
      var n=Object.assign({},pl);
      n.snotes=Object.assign({},pl.snotes);
      n.snotes[sec]=val;
      return n;
    });});
  }
  function updRat(idx,k,v){
    setPlayers(function(prev){return prev.map(function(pl,i){
      if(i!==idx)return pl;
      var n=Object.assign({},pl);
      n.ratings=Object.assign({},pl.ratings);
      n.ratings[k]=v;
      return n;
    });});
  }
  function clearPlayer(idx){
    setPlayers(function(prev){return prev.map(function(pl,i){
      if(i!==idx)return pl;
      return Object.assign(mkPlayer(),{id:pl.id});
    });});
    setShowConfirm(false);
  }
  function removePlayer(idx){
    if(players.length===1)return;
    var newPlayers=players.filter(function(_,i){return i!==idx;});
    setPlayers(newPlayers);
    var newActive=Math.min(activeIdx,newPlayers.length-1);
    setActiveIdx(newActive);
  }
  function doCopy(idx){
    var text=buildText(players[idx],idx,players.length);
    navigator.clipboard.writeText(text).then(function(){
      setCopied(function(p){var n=Object.assign({},p);n[idx]=true;return n;});
      setTimeout(function(){setCopied(function(p){var n=Object.assign({},p);n[idx]=false;return n;});},3000);
    });
  }

  var total=players.length;

  return h('div',null,
    /* HEADER */
    h('div',{className:'hdr'},
      h('div',{className:'logo'},
        h('svg',{width:34,height:34,viewBox:'0 0 34 34',fill:'none',xmlns:'http://www.w3.org/2000/svg'},
          h('circle',{cx:17,cy:17,r:17,fill:'#0e1820'}),
          h('circle',{cx:14,cy:14,r:7,stroke:'#b8f542',strokeWidth:2.5,fill:'none'}),
          h('line',{x1:19.5,y1:19.5,x2:27,y2:27,stroke:'#b8f542',strokeWidth:2.5,strokeLinecap:'round'})
        )
      ),
      h('div',{className:'hdr-info'},
        h('div',{className:'hdr-t'},'Scouting Tool')
      ),
      h('div',{className:'save-dot'+(showSaved?' show':'')}),
      total>1&&h('div',{className:'hdr-center'},
        h('div',{className:'hdr-player'},
          h('div',{className:'hdr-player-name'},
            (players[activeIdx].pos ? players[activeIdx].pos+' · ' : '')+
            (players[activeIdx].name||'—')
          )
        )
      ),
      h('div',{className:'hdr-right'},
        h('button',{className:'hdr-btn add',onClick:addPlayer},
          h('span',{className:'btn-short'},'+'),
          h('span',{className:'btn-full'},'+ Dodaj zawodnika')
        ),
        h('button',{className:'hdr-btn clear',onClick:function(){setShowConfirm(true);}},
          'Wyczyść'
        )
      )
    ),

    /* CONFIRM MODAL */
    showConfirm&&h('div',{className:'modal-bg'},
      h('div',{className:'modal'},
        h('div',{className:'modal-title'},'Wyczyścić zawodnika '+(activeIdx+1)+'?'),
        h('div',{className:'modal-txt'},'Wszystkie dane tego zawodnika zostaną usunięte. Tej operacji nie można cofnąć.'),
        h('div',{className:'modal-btns'},
          h('button',{className:'modal-cancel',onClick:function(){setShowConfirm(false);}},'Anuluj'),
          h('button',{className:'modal-confirm',onClick:function(){clearPlayer(activeIdx);}},'Wyczyść')
        )
      )
    ),

    /* RIGHT NAV — only when >1 player */
    total>1&&h('div',{className:'rnav'},
      h('button',{className:'rnav-btn',onClick:function(){goTo(activeIdx-1);},disabled:activeIdx===0,title:'Poprzedni zawodnik'},'↑'),
      h('div',{className:'rnav-dots'},
        players.map(function(pl,i){
          var pct=calcProgress(pl);
          var col=progColor(pct);
          return h('div',{key:pl.id,className:'rnav-dot-wrap'},
            h('div',{className:'rnav-ring',style:{borderColor:col,opacity:pct>0?1:0}}),
            h('button',{className:'rnav-dot'+(i===activeIdx?' on':''),onClick:function(){goTo(i);},title:'Zawodnik '+(i+1)+' — '+pct+'%'})
          );
        })
      ),
      h('button',{className:'rnav-btn',onClick:function(){goTo(activeIdx+1);},disabled:activeIdx===total-1,title:'Następny zawodnik'},'↓')
    ),

    /* PLAYERS */
    h('div',{className:'main'},
      players.map(function(pl,idx){
        var clKey=pl.pos?POS_TO_CL[pl.pos]:null;
        var isCopied=!!copied[idx];
        return h('div',{key:pl.id,id:'ps-'+pl.id,'data-pid':String(pl.id),className:'player-section'},
          /* divider */
          h('div',{className:'player-divider'},
            h('div',{className:'player-divider-line'}),
            h('span',{className:'player-label'},'Zawodnik '+(idx+1)),
            h('div',{className:'player-divider-line'}),
            players.length>1&&h('button',{className:'remove-btn',onClick:function(){removePlayer(idx);}},'Usuń')
          ),
          /* progress bar */
          (function(){
            var pct=calcProgress(pl);
            var col=progColor(pct);
            return h('div',{className:'prog-row'},
              h('div',{className:'prog-bar'},
                h('div',{className:'prog-fill',style:{width:pct+'%',background:col}})
              ),
              h('span',{className:'prog-pct',style:{color:col}},pct+'%')
            );
          })(),

          /* name */
          h('input',{className:'fi nm',placeholder:'Imię i nazwisko zawodnika...',value:pl.name,
            onChange:function(e){upd(idx,'name',e.target.value);}}),

          h('div',{className:'g2'},
            h('div',null,
              h('div',{className:'fl'},'Profil na Transfermarkt (link)'),
              h('input',{className:'fi',placeholder:'https://www.transfermarkt.com/...',value:pl.tmLink,
                onChange:function(e){upd(idx,'tmLink',e.target.value);}})
            ),
            h('div',{className:'g3'},
              h('div',null,h('div',{className:'fl'},'Skaut'),h('input',{className:'fi',value:'Jarosław Pulkowski',disabled:true})),
              h('div',null,
                h('div',{className:'fl'},'Data obserwacji'),
                h('input',{className:'fi',type:'date',value:pl.date,onChange:function(e){upd(idx,'date',e.target.value);}})
              ),
              h('div',null,
                h('div',{className:'fl'},'Typ obserwacji'),
                h('div',{className:'tog'},
                  ['Video','Na żywo'].map(function(o){return h('button',{key:o,className:'tbtn'+(pl.mode===o?' on':''),onClick:function(){upd(idx,'mode',o);}},o);})
                )
              )
            )
          ),

          /* position */
          h('div',{className:'stitle'},'Pozycja obserwowanego zawodnika'),
          h('div',{className:'ptabs'},
            POSITIONS.map(function(p){return h('button',{key:p.id,className:'ptab'+(pl.pos===p.id?' on':''),onClick:function(){upd(idx,'pos',p.id);}},p.label);})
          ),

          /* checklist */
          h('div',{className:'stitle'},'Checklista obserwacyjna'),
          !clKey
            ?h('div',{className:'empty-pos'},'Wybierz pozycję, aby zobaczyć checklistę')
            :h('div',{className:'cl-grid'},
                SECS.map(function(sec){
                  return h(ClSection,{
                    key:pl.id+'-'+sec,sec:sec,clKey:clKey,
                    chk:pl.chk,cnotes:pl.cnotes,snotes:pl.snotes,
                    setChkVal:function(s,ci,v){updChk(idx,s,ci,v);},
                    setCn:function(s,ci,v){updCn(idx,s,ci,v);},
                    usn:function(s,v){updSn(idx,s,v);}
                  });
                })
              ),

          /* ratings */
          h('div',{className:'stitle'},'Ocena zawodnika'),
          h('div',{className:'rat-row'},
            h('div',null,
              h('div',{className:'rl'},'Doporučení'),
              h('div',{className:'rec-btns'},
                h('button',{className:'rec-btn ano'+(pl.ratings.rec==='ANO'?' on':''),onClick:function(){updRat(idx,'rec','ANO');}}, 'ANO'),
                h('button',{className:'rec-btn ne'+(pl.ratings.rec==='NE'?' on':''), onClick:function(){updRat(idx,'rec','NE');}},  'NE')
              )
            ),
            h('div',null,
              h('div',{className:'rl'},'Hodnocení (A = najlepiej)'),
              h('select',{className:'rsel',value:pl.ratings.rating,onChange:function(e){updRat(idx,'rating',e.target.value);}},
                h('option',{value:''},'—'),['A','B','C','D'].map(function(v){return h('option',{key:v,value:v},v);})
              )
            ),
            h('div',null,
              h('div',{className:'rl'},'Potenciál (A = najlepiej)'),
              h('select',{className:'rsel',value:pl.ratings.pot,onChange:function(e){updRat(idx,'pot',e.target.value);}},
                h('option',{value:''},'—'),['A','B','C','D'].map(function(v){return h('option',{key:v,value:v},v);})
              )
            )
          ),

          /* match notes */
          h('div',{className:'stitle'},'Ogólne notatki z meczu'),
          withMic(
            h('textarea',{className:'match-notes',
              placeholder:'Kontekst meczu, wynik, styl gry drużyny, warunki obserwacji, cokolwiek istotnego...',
              value:pl.matchNotes,rows:4,
              onChange:function(e){upd(idx,'matchNotes',e.target.value);autoH(e.target);},
              onFocus:function(e){autoH(e.target);}}),
            'mn-'+idx,
            function(t){upd(idx,'matchNotes',(pl.matchNotes?pl.matchNotes+' ':'')+t);}
          ),

          /* buttons */
          h('button',{className:'copy-btn'+(isCopied?' copied':''),onClick:function(){doCopy(idx);},disabled:!pl.pos||!pl.name},
            isCopied?'✓  Skopiowano':'Kopiuj dane'
          ),
          h('button',{className:'pdf-btn',onClick:function(){window.print();}},'📄  Zapisz jako PDF'),
          idx===players.length-1&&h('div',{className:'tip-box'},
            h('strong',null,'Jak to działa: '),
            'Wypełnij checklistę i notatki podczas oglądania meczu. Kliknij "Kopiuj dane" — dane trafią do schowka.'
          )
        );
      })
    )
  );
}

ReactDOM.render(h(App),document.getElementById('app'));
</script>
</body>
</html>
